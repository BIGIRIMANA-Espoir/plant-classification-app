<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plant Classification AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 35px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            width: 100%;
            max-width: 520px;
        }
        .btn-custom {
            background: linear-gradient(45deg, #11998e, #38ef7d);
            border: none;
            color: #fff;
            font-weight: 600;
            border-radius: 10px;
            padding: 12px;
            transition: all 0.3s ease;
        }
        .btn-custom:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(56, 239, 125, 0.3);
            color: #fff;
        }
        .preview-img {
            max-height: 250px;
            border-radius: 12px;
            object-fit: cover;
            width: 100%;
            border: 2px dashed rgba(255,255,255,0.3);
        }
        .hidden { display: none !important; }
        .badge-confidence { font-size: 1.1rem; padding: 8px 16px; border-radius: 20px; }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center">
    
    <!-- 🔒 ÉCRAN DE CONNEXION -->
    <div id="login-screen" class="glass-card text-center">
        <div class="mb-4">
            <i class="bi bi-shield-lock-fill display-3 text-success"></i>
            <h2 class="mt-3 font-weight-bold">Accès Sécurisé</h2>
            <p class="text-white-50">Entrez le mot de passe pour accéder à l'IA</p>
        </div>
        <form id="login-form">
            <div class="mb-3">
                <input type="password" id="password-input" class="form-control form-control-lg bg-dark text-white border-secondary text-center" placeholder="Mot de passe" required>
            </div>
            <button type="submit" class="btn btn-custom w-100">Se connecter <i class="bi bi-arrow-right"></i></button>
            <div id="login-error" class="text-danger mt-3 small hidden">Mot de passe incorrect !</div>
        </form>
    </div>

    <!-- 🌿 ÉCRAN PRINCIPAL -->
    <div id="app-screen" class="glass-card hidden text-center">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="m-0"><i class="bi bi-flower1 text-success"></i> Classification IA</h4>
            <button class="btn btn-sm btn-outline-light" onclick="logout()"><i class="bi bi-box-arrow-right"></i></button>
        </div>

        <!-- Zone d'importation -->
        <div class="mb-3">
            <img id="preview" class="preview-img mb-3 hidden" src="#" alt="Aperçu">
            <input type="file" id="image-input" class="form-control bg-dark text-white border-secondary" accept="image/*">
        </div>

        <button id="analyze-btn" class="btn btn-custom w-100 mb-3" onclick="analyzeImage()" disabled>
            <i class="bi bi-search"></i> Analyser la feuille
        </button>

        <!-- Loader -->
        <div id="loader" class="spinner-border text-success my-3 hidden" role="status"></div>

        <!-- Zone de Résultat -->
        <div id="result-box" class="mt-3 p-3 bg-dark rounded-3 hidden border border-secondary">
            <h5 class="text-white-50 mb-2">Résultat :</h5>
            <h3 id="result-text" class="fw-bold mb-2">---</h3>
            <span id="confidence-badge" class="badge badge-confidence bg-success">Confiance: --%</span>
            
            <div class="mt-3 text-start small text-white-50">
                <div class="d-flex justify-content-between">
                    <span>Amarante:</span> <strong id="prob-amarante" class="text-white">--</strong>
                </div>
                <div class="d-flex justify-content-between">
                    <span>Légumes:</span> <strong id="prob-legumes" class="text-white">--</strong>
                </div>
            </div>
        </div>

    </div>

</div>

<script>
    const APP_PASSWORD = "admin"; // Mot de passe d'accès par défaut

    // Gestion de la connexion
    document.getElementById('login-form').addEventListener('submit', function(e) {
        e.preventDefault();
        const pwd = document.getElementById('password-input').value;
        if(pwd === APP_PASSWORD) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('app-screen').classList.remove('hidden');
        } else {
            document.getElementById('login-error').classList.remove('hidden');
        }
    });

    function logout() {
        document.getElementById('app-screen').classList.add('hidden');
        document.getElementById('login-screen').classList.remove('hidden');
        document.getElementById('password-input').value = '';
    }

    // Prévisualisation d'image
    const imageInput = document.getElementById('image-input');
    const preview = document.getElementById('preview');
    const analyzeBtn = document.getElementById('analyze-btn');

    imageInput.addEventListener('change', function() {
        const file = this.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                preview.src = e.target.result;
                preview.classList.remove('hidden');
                analyzeBtn.disabled = false;
            }
            reader.readAsDataURL(file);
        }
    });

    // Envoi à l'API
    async function analyzeImage() {
        const file = imageInput.files[0];
        if(!file) return;

        const formData = new FormData();
        formData.append('file', file);

        document.getElementById('loader').classList.remove('hidden');
        document.getElementById('result-box').classList.add('hidden');

        try {
            const response = await fetch('/predict', {
                method: 'POST',
                body: formData
            });

            const data = await response.json();
            document.getElementById('loader').classList.add('hidden');
            document.getElementById('result-box').classList.remove('hidden');

            const resultText = document.getElementById('result-text');
            const confBadge = document.getElementById('confidence-badge');

            if(data.is_known) {
                resultText.innerText = data.prediction.toUpperCase();
                resultText.className = "fw-bold mb-2 text-success";
                confBadge.innerText = `Confiance : ${data.confidence}`;
                confBadge.className = "badge badge-confidence bg-success";
            } else {
                resultText.innerText = "OBJET / PLANTE INCONNU(E)";
                resultText.className = "fw-bold mb-2 text-warning";
                confBadge.innerText = `Confiance faible : ${data.confidence}`;
                confBadge.className = "badge badge-confidence bg-warning text-dark";
            }

            document.getElementById('prob-amarante').innerText = data.probabilities.amarante;
            document.getElementById('prob-legumes').innerText = data.probabilities.legumes;

        } catch (err) {
            alert("Erreur lors de l'analyse.");
            document.getElementById('loader').classList.add('hidden');
        }
    }
</script>

</body>
</html>
