<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plant Classification AI</title>
    <style>
        :root {
            --bg-color: #1a262f;
            --card-bg: #22313f;
            --accent-color: #2ecc71;
            --accent-hover: #27ae60;
            --text-color: #ecf0f1;
            --subtext-color: #bdc3c7;
            --danger-color: #e74c3c;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 480px;
            padding: 25px;
            box-sizing: border-box;
        }

        h2 {
            text-align: center;
            margin-top: 0;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .auth-box, .app-box {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .hidden {
            display: none !important;
        }

        /* Onglets Mode Fichier / Mode Caméra */
        .tab-buttons {
            display: flex;
            gap: 10px;
            background: rgba(0,0,0,0.2);
            padding: 5px;
            border-radius: 10px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            color: var(--subtext-color);
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        .tab-btn.active {
            background: var(--accent-color);
            color: #1a262f;
        }

        input[type="password"], input[type="file"] {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #34495e;
            background: #1a262f;
            color: var(--text-color);
            box-sizing: border-box;
        }

        button.action-btn {
            background-color: var(--accent-color);
            color: #1a262f;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
            width: 100%;
        }

        button.action-btn:hover {
            background-color: var(--accent-hover);
        }

        /* Caméra & Prévisualisation */
        .media-container {
            width: 100%;
            height: 250px;
            background-color: #1a262f;
            border-radius: 10px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            border: 2px dashed #34495e;
        }

        video, img#preview {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Résultat */
        .result-box {
            background-color: #1a262f;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
        }

        .badge {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 18px;
            margin-top: 5px;
        }

        .badge-success { background-color: var(--accent-color); color: #1a262f; }
        .badge-warning { background-color: var(--danger-color); color: white; }

        .prob-list {
            margin-top: 15px;
            text-align: left;
            font-size: 14px;
            color: var(--subtext-color);
        }

        .prob-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🌿 Classification IA</h2>

    <!-- SECTION 1 : Mot de passe -->
    <div id="auth-section" class="auth-box">
        <p style="text-align: center; color: var(--subtext-color);">Accès sécurisé requis</p>
        <input type="password" id="password-input" placeholder="Entrez le mot de passe...">
        <button class="action-btn" onclick="login()">Se connecter</button>
        <p id="auth-error" style="color: var(--danger-color); text-align: center; margin: 0;" class="hidden">Mot de passe incorrect</p>
    </div>

    <!-- SECTION 2 : Application principale -->
    <div id="app-section" class="app-box hidden">
        
        <!-- Sélection du mode -->
        <div class="tab-buttons">
            <button class="tab-btn active" id="tab-file-btn" onclick="switchTab('file')">📁 Import Fichier</button>
            <button class="tab-btn" id="tab-cam-btn" onclick="switchTab('cam')">📷 Caméra Live</button>
        </div>

        <!-- ZONE 1 : Importation de fichier -->
        <div id="file-mode" class="app-box">
            <input type="file" id="image-input" accept="image/*" onchange="previewFile()">
            <div class="media-container">
                <img id="preview" src="" class="hidden" alt="Aperçu">
                <span id="placeholder-text" style="color: var(--subtext-color);">Aucune image sélectionnée</span>
            </div>
            <button class="action-btn" onclick="analyzeFile()"> Analyser l'image</button>
        </div>

        <!-- ZONE 2 : Caméra en direct -->
        <div id="cam-mode" class="app-box hidden">
            <div class="media-container">
                <video id="webcam" autoplay playsinline class="hidden"></video>
                <canvas id="canvas" class="hidden"></canvas>
                <span id="cam-placeholder" style="color: var(--subtext-color);">Caméra désactivée</span>
            </div>
            <button class="action-btn" id="start-cam-btn" onclick="startCamera()"> Activer la caméra</button>
            <button class="action-btn hidden" id="capture-btn" onclick="captureAndAnalyze()"> Capture et Analyser</button>
        </div>

        <!-- ZONE 3 : Affichage des Résultats -->
        <div id="result-section" class="result-box hidden">
            <h3 style="margin: 0; color: var(--subtext-color);">Résultat :</h3>
            <div id="prediction-badge" class="badge">---</div>
            <p id="confidence-text" style="margin-top: 8px; font-weight: bold;"></p>

            <div class="prob-list" id="prob-container"></div>
        </div>

    </div>
</div>

<script>
    const API_URL = ""; // Relatif car hébergé sur la même instance FastAPI
    let stream = null;

    // Authentification
    async function login() {
        const password = document.getElementById('password-input').value;
        const formData = new FormData();
        formData.append('password', password);

        try {
            const response = await fetch('/verify-password', { method: 'POST', body: formData });
            if (response.ok) {
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('app-section').classList.remove('hidden');
            } else {
                document.getElementById('auth-error').classList.remove('hidden');
            }
        } catch (e) {
            alert("Erreur de connexion avec le serveur.");
        }
    }

    // Gestion des Onglets
    function switchTab(mode) {
        document.getElementById('result-section').classList.add('hidden');
        if (mode === 'file') {
            document.getElementById('tab-file-btn').classList.add('active');
            document.getElementById('tab-cam-btn').classList.remove('active');
            document.getElementById('file-mode').classList.remove('hidden');
            document.getElementById('cam-mode').classList.add('hidden');
            stopCamera();
        } else {
            document.getElementById('tab-cam-btn').classList.add('active');
            document.getElementById('tab-file-btn').classList.remove('active');
            document.getElementById('cam-mode').classList.remove('hidden');
            document.getElementById('file-mode').classList.add('hidden');
        }
    }

    // MODE FICHIER
    function previewFile() {
        const file = document.getElementById('image-input').files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('preview').src = e.target.result;
                document.getElementById('preview').classList.remove('hidden');
                document.getElementById('placeholder-text').classList.add('hidden');
            }
            reader.readAsDataURL(file);
        }
    }

    async function analyzeFile() {
        const fileInput = document.getElementById('image-input');
        if (!fileInput.files[0]) {
            alert("Veuillez d'abord choisir un fichier.");
            return;
        }
        const formData = new FormData();
        formData.append('file', fileInput.files[0]);
        sendPrediction(formData);
    }

    // MODE CAMÉRA
    async function startCamera() {
        try {
            stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            const video = document.getElementById('webcam');
            video.srcObject = stream;
            video.classList.remove('hidden');
            document.getElementById('cam-placeholder').classList.add('hidden');
            document.getElementById('start-cam-btn').classList.add('hidden');
            document.getElementById('capture-btn').classList.remove('hidden');
        } catch (err) {
            alert("Impossible d'accéder à la caméra : " + err.message);
        }
    }

    function stopCamera() {
        if (stream) {
            stream.getTracks().forEach(track => track.stop());
            document.getElementById('webcam').classList.add('hidden');
            document.getElementById('cam-placeholder').classList.remove('hidden');
            document.getElementById('start-cam-btn').classList.remove('hidden');
            document.getElementById('capture-btn').classList.add('hidden');
        }
    }

    async function captureAndAnalyze() {
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

        canvas.toBlob(async function(blob) {
            const formData = new FormData();
            formData.append('file', blob, 'capture.jpg');
            sendPrediction(formData);
        }, 'image/jpeg');
    }

    // Envoi à l'API FastAPI
    async function sendPrediction(formData) {
        try {
            const response = await fetch('/predict', { method: 'POST', body: formData });
            const data = await response.json();

            if (response.ok) {
                displayResult(data);
            } else {
                alert("Erreur: " + data.detail);
            }
        } catch (e) {
            alert("Erreur lors de l'analyse.");
        }
    }

    // Affichage des résultats
    function displayResult(data) {
        const resultSection = document.getElementById('result-section');
        const badge = document.getElementById('prediction-badge');
        const confText = document.getElementById('confidence-text');
        const probContainer = document.getElementById('prob-container');

        resultSection.classList.remove('hidden');

        if (data.is_known) {
            badge.innerText = data.prediction;
            badge.className = "badge badge-success";
        } else {
            badge.innerText = "INCONNU / CERTITUDE INSUFFISANTE";
            badge.className = "badge badge-warning";
        }

        confText.innerText = `Niveau de confiance : ${data.confidence}`;

        // Détails des probabilités
        probContainer.innerHTML = "<strong>Détails :</strong>";
        for (const [key, val] of Object.entries(data.probabilities)) {
            probContainer.innerHTML += `
                <div class="prob-item">
                    <span>${key.toUpperCase()}</span>
                    <span>${val}</span>
                </div>
            `;
        }
    }
</script>
</body>
</html>
